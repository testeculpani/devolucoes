    <symbol id="i-file" viewBox="0 0 24 24"><path d="M6 2h8l4 4v16H6V2Z"/><path d="M14 2v5h5M9 13h6M9 17h5"/></symbol>
    <symbol id="i-truck" viewBox="0 0 24 24"><path d="M3 6h11v11H3zM14 10h4l3 3v4h-7z"/><circle cx="7" cy="18" r="2"/><circle cx="18" cy="18" r="2"/></symbol>
    <symbol id="i-save" viewBox="0 0 24 24"><path d="M5 3h12l3 3v15H4V3h1Z"/><path d="M8 3v6h8V3M8 21v-8h8v8"/></symbol>
    <symbol id="i-eraser" viewBox="0 0 24 24"><path d="m7 21-4-4L15 5l6 6-10 10H7ZM11 9l6 6M7 21h14"/></symbol>
    <symbol id="i-eye" viewBox="0 0 24 24"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></symbol>
    <symbol id="i-edit" viewBox="0 0 24 24"><path d="M4 20h4L20 8l-4-4L4 16v4ZM13 7l4 4"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24"><path d="M4 7h16M9 3h6l1 4H8l1-4ZM6 7l1 14h10l1-14M10 11v6M14 11v6"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M4 21h16"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol>
    <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v6M12 7h.01"/></symbol>
    <symbol id="i-filter" viewBox="0 0 24 24"><path d="M4 5h16l-6 7v6l-4 2v-8L4 5Z"/></symbol>
  </svg>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><div class="brand-mark"><svg class="ico"><use href="#i-return"/></svg></div><div><h1>Retorna</h1><p>Gestão inteligente</p></div></div>
      <div class="nav-label">Menu principal</div>
      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard"><svg class="ico"><use href="#i-dashboard"/></svg>Dashboard</button>
        <button class="nav-btn" data-view="new"><svg class="ico"><use href="#i-plus"/></svg>Nova devolução</button>
        <button class="nav-btn" data-view="history"><svg class="ico"><use href="#i-history"/></svg>Histórico <span class="badge" id="navCount">0</span></button>
      </nav>
      <div class="sidebar-card"><div class="row"><span class="dot"></span>Armazenamento ativo</div><p>Os dados ficam salvos neste navegador. A conexão com o Firebase pode ser adicionada depois.</p></div>
    </aside>
    <div class="mobile-overlay" id="overlay"></div>
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="Abrir menu"><svg class="ico"><use href="#i-menu"/></svg></button>
      <div class="top-search"><svg class="ico"><use href="#i-search"/></svg><input id="globalSearch" type="search" placeholder="Pesquisar cliente, CNPJ ou nota fiscal..." autocomplete="off"></div>
      <div class="top-actions"><button class="icon-btn" aria-label="Notificações"><svg class="ico"><use href="#i-bell"/></svg><span class="ping"></span></button><div class="user"><div class="avatar">AD</div><div><strong>Administrador</strong><small>Gestão de devoluções</small></div></div></div>
    </header>
    <main class="main" id="main"></main>
  </div>
  <div class="modal-layer" id="modalLayer" aria-hidden="true"></div>
  <div class="toast" id="toast"><span class="toast-icon"><svg class="ico"><use href="#i-check"/></svg></span><p id="toastText"></p></div>

  <script>
  (()=>{
    'use strict';

    const STORAGE_KEY='retorna_devolucoes_v1';
    const REASONS=['Avaria no transporte','Produto divergente','Erro de faturamento','Produto vencido','Recusa do cliente','Pedido duplicado','Problema de qualidade','Outros'];
    const STATUSES=['Pendente','Em coleta','Concluída','Cancelada'];
    const state={view:'dashboard',period:'month',rankType:'reason',editingId:null,filters:{query:'',status:'',start:'',end:''}};
    let records=loadRecords();
    let formModel=emptyForm();
    let toastTimer;

    function icon(name){return `<svg class="ico"><use href="#i-${name}"/></svg>`}
    function escapeHTML(value){return String(value??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]))}
    function uid(){return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`}
    function isoDate(date=new Date()){const y=date.getFullYear(),m=String(date.getMonth()+1).padStart(2,'0'),d=String(date.getDate()).padStart(2,'0');return `${y}-${m}-${d}`}
    function daysAgo(n){const d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()-n);return isoDate(d)}
    function monthsAgo(n,day=10){const d=new Date();d.setHours(12,0,0,0);d.setMonth(d.getMonth()-n,day);return isoDate(d)}
    function formatDate(value){if(!value)return '—';const [y,m,d]=value.split('-');return `${d}/${m}/${y}`}
    function formatMoney(value){return Number(value||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
    function normalize(value){return String(value??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()}
    function statusClass(status){return normalize(status).replace('em ','').replace(/\s/g,'')}
    function parseMoney(value){if(typeof value==='number')return value;return Number(String(value).replace(/[^\d]/g,''))/100||0}
    function moneyInput(value){const cents=String(Math.round(Number(value||0)*100));return (Number(cents)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
    function maskCNPJ(value){const v=String(value).replace(/\D/g,'').slice(0,14);return v.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d)/,'$1-$2')}
    function validCNPJ(value){const c=String(value).replace(/\D/g,'');if(c.length!==14||/^(\d)\1+$/.test(c))return false;const digit=(base,weights)=>{const sum=base.split('').reduce((a,n,i)=>a+Number(n)*weights[i],0);const r=sum%11;return r<2?0:11-r};const d1=digit(c.slice(0,12),[5,4,3,2,9,8,7,6,5,4,3,2]);const d2=digit(c.slice(0,12)+d1,[6,5,4,3,2,9,8,7,6,5,4,3,2]);return c.endsWith(`${d1}${d2}`)}

    function emptyForm(){return{cnpj:'',client:'',invoice:'',date:isoDate(),carrier:'',reason:'',value:0,representative:'',status:'Pendente',notes:''}}
    function demoRecords(){return[
      {id:uid(),cnpj:'12.345.678/0001-95',client:'Supermercado Central',invoice:'NF-10482',date:daysAgo(0),carrier:'TransLog Brasil',reason:'Avaria no transporte',value:3870.50,representative:'Marcos Almeida',status:'Pendente',notes:'Caixas amassadas durante o transporte.',_demo:true},
      {id:uid(),cnpj:'45.617.982/0001-08',client:'Comercial Horizonte',invoice:'NF-10467',date:daysAgo(1),carrier:'Rápido Sul',reason:'Produto divergente',value:2145.90,representative:'Juliana Costa',status:'Em coleta',notes:'Itens recebidos diferentes da nota.',_demo:true},
      {id:uid(),cnpj:'27.865.410/0001-31',client:'Rede Bom Preço',invoice:'NF-10431',date:daysAgo(3),carrier:'Veloz Transportes',reason:'Recusa do cliente',value:5280,representative:'Marcos Almeida',status:'Concluída',notes:'Cliente recusou por atraso na entrega.',_demo:true},
      {id:uid(),cnpj:'18.492.730/0001-64',client:'Atacado Nova Era',invoice:'NF-10398',date:daysAgo(5),carrier:'TransLog Brasil',reason:'Erro de faturamento',value:1690.35,representative:'Ricardo Lima',status:'Pendente',notes:'Condição comercial divergente.',_demo:true},
      {id:uid(),cnpj:'63.951.240/0001-77',client:'Mercado São Lucas',invoice:'NF-10385',date:daysAgo(9),carrier:'Expresso Norte',reason:'Produto vencido',value:935.70,representative:'Juliana Costa',status:'Concluída',notes:'Lote com validade insuficiente.',_demo:true},
      {id:uid(),cnpj:'39.572.168/0001-49',client:'Distribuidora Vitória',invoice:'NF-10351',date:daysAgo(14),carrier:'Rápido Sul',reason:'Pedido duplicado',value:4200,representative:'Ana Beatriz',status:'Em coleta',notes:'Pedido expedido em duplicidade.',_demo:true},
      {id:uid(),cnpj:'72.436.951/0001-20',client:'Comercial Paulista',invoice:'NF-10287',date:monthsAgo(1,21),carrier:'Veloz Transportes',reason:'Avaria no transporte',value:7520.80,representative:'Marcos Almeida',status:'Concluída',notes:'',_demo:true},
      {id:uid(),cnpj:'51.208.764/0001-03',client:'Rede Mais Econômica',invoice:'NF-10214',date:monthsAgo(1,7),carrier:'TransLog Brasil',reason:'Problema de qualidade',value:2840.10,representative:'Ricardo Lima',status:'Cancelada',notes:'',_demo:true},
      {id:uid(),cnpj:'84.307.619/0001-55',client:'Empório Avenida',invoice:'NF-10136',date:monthsAgo(2,16),carrier:'Expresso Norte',reason:'Produto divergente',value:3615.45,representative:'Ana Beatriz',status:'Concluída',notes:'',_demo:true},
      {id:uid(),cnpj:'16.845.397/0001-82',client:'Atacado União',invoice:'NF-10042',date:monthsAgo(3,11),carrier:'Rápido Sul',reason:'Avaria no transporte',value:6180.25,representative:'Juliana Costa',status:'Concluída',notes:'',_demo:true},
      {id:uid(),cnpj:'95.163.428/0001-16',client:'Mercantil Imperial',invoice:'NF-09978',date:monthsAgo(4,18),carrier:'Veloz Transportes',reason:'Recusa do cliente',value:1950,representative:'Marcos Almeida',status:'Concluída',notes:'',_demo:true},
      {id:uid(),cnpj:'34.729.580/0001-91',client:'Supermercado Família',invoice:'NF-09891',date:monthsAgo(5,8),carrier:'TransLog Brasil',reason:'Erro de faturamento',value:4480.60,representative:'Ricardo Lima',status:'Concluída',notes:'',_demo:true}
    ]}
    function loadRecords(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));return Array.isArray(saved)?saved:demoRecords()}catch(e){return demoRecords()}}
    // Adaptador de dados: troque estas duas funções pela integração Firestore quando desejar.
    function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(records));return true}catch(e){toast('Não foi possível salvar no navegador.','error');return false}}

    function setView(view){state.view=view;if(view==='new'&&!state.editingId)formModel=emptyForm();document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===view));closeSidebar();render();window.scrollTo({top:0,behavior:'smooth'})}
    function render(){document.getElementById('navCount').textContent=records.length;const main=document.getElementById('main');main.innerHTML=state.view==='dashboard'?dashboardHTML():state.view==='new'?formHTML():historyHTML();if(state.view==='dashboard')wireDashboard();if(state.view==='new')wireForm();if(state.view==='history')wireHistory()}
    function pageHead(kicker,title,desc,action=''){return `<div class="page-head"><div><div class="eyebrow">${kicker}</div><h2>${title}</h2><p>${desc}</p></div>${action}</div>`}
    function filterByPeriod(period){const now=new Date();now.setHours(23,59,59,999);let start=new Date(now);if(period==='day')start.setHours(0,0,0,0);else if(period==='week'){start.setDate(now.getDate()-6);start.setHours(0,0,0,0)}else{start.setDate(1);start.setHours(0,0,0,0)}return records.filter(r=>{const d=new Date(`${r.date}T12:00:00`);return d>=start&&d<=now})}
    function aggregate(list,key){const map={};list.forEach(r=>{const label=r[key]||'Não informado';if(!map[label])map[label]={name:label,count:0,value:0};map[label].count++;map[label].value+=Number(r.value||0)});return Object.values(map).sort((a,b)=>b.value-a.value)}
    function monthlyData(){const out=[];for(let i=5;i>=0;i--){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);const y=d.getFullYear(),m=d.getMonth();const list=records.filter(r=>{const x=new Date(`${r.date}T12:00:00`);return x.getFullYear()===y&&x.getMonth()===m});out.push({label:d.toLocaleDateString('pt-BR',{month:'short'}).replace('.',''),value:list.reduce((s,r)=>s+Number(r.value||0),0),current:i===0})}return out}
    function statCard(iconName,label,value,foot,accent,soft){return `<article class="card stat" style="--accent:${accent};--soft:${soft}"><div class="stat-top"><span class="stat-label">${label}</span><span class="stat-icon">${icon(iconName)}</span></div><div class="stat-value">${value}</div><div class="stat-foot">${foot}</div></article>`}
    function rankingHTML(title,iconName,data){const max=Math.max(...data.map(x=>x.value),1);return `<article class="card rank-card"><div class="rank-title"><div>${icon(iconName)}<h3>${title}</h3></div></div>${data.length?data.slice(0,5).map((x,i)=>`<div class="rank-item"><span class="rank-num">${i+1}</span><div class="rank-name"><b title="${escapeHTML(x.name)}">${escapeHTML(x.name)}</b><div class="mini-track"><i style="width:${Math.max(8,x.value/max*100)}%"></i></div></div><div class="rank-val"><b>${formatMoney(x.value)}</b><small>${x.count} registro${x.count===1?'':'s'}</small></div></div>`).join(''):`<div class="empty"><p>Nenhum dado no período.</p></div>`}</article>`}
    function dashboardHTML(){
      const list=filterByPeriod(state.period),total=list.reduce((s,r)=>s+Number(r.value||0),0),pending=list.filter(r=>r.status==='Pendente').length,done=list.filter(r=>r.status==='Concluída').length;
      const month=monthlyData(),max=Math.max(...month.map(x=>x.value),1),statusCounts=STATUSES.map(s=>({name:s,count:list.filter(r=>r.status===s).length})),colors=['#f3a20c','#2476e5','#18a873','#e15050'];
      const gradient=statusCounts.reduce((acc,x,i)=>{const totalCount=Math.max(list.length,1),from=acc.pos,to=from+x.count/totalCount*100;acc.parts.push(`${colors[i]} ${from}% ${to}%`);acc.pos=to;return acc},{parts:[],pos:0}).parts.join(',')||'#edf1f5 0 100%';
      return `${pageHead('Visão geral','Dashboard de devoluções','Acompanhe os principais indicadores e identifique oportunidades de melhoria.',`<button class="primary" data-go="new">${icon('plus')}Nova devolução</button>`)}
      <div style="display:flex;justify-content:flex-end;margin:-7px 0 14px"><div class="period-tabs"><button data-period="day" class="${state.period==='day'?'active':''}">Hoje</button><button data-period="week" class="${state.period==='week'?'active':''}">7 dias</button><button data-period="month" class="${state.period==='month'?'active':''}">Este mês</button></div></div>
      <section class="grid stats">${statCard('package','Devoluções',list.length,`<b>${done}</b> concluída${done===1?'':'s'} no período`,'#1769e0','#eaf2ff')}${statCard('money','Valor devolvido',formatMoney(total),'Soma dos registros selecionados','#ff6b00','#fff0e5')}${statCard('clock','Pendentes',pending,'Aguardando tratamento','#c27b00','#fff5da')}${statCard('check','Taxa de conclusão',`${list.length?Math.round(done/list.length*100):0}%`,'Registros finalizados','#12a36d','#e7f8f1')}</section>
      <section class="grid dash-main"><article class="card"><div class="panel-head"><div><h3>Evolução do valor devolvido</h3><p>Comparativo dos últimos seis meses</p></div></div><div class="chart-wrap"><div class="chart"><div class="y-axis"><span>${formatMoney(max)}</span><span>${formatMoney(max*.66)}</span><span>${formatMoney(max*.33)}</span><span>R$ 0</span></div><div class="bars">${month.map(x=>`<div class="bar-col"><div class="bar ${x.current?'current':''}" style="height:${Math.max(3,x.value/max*100)}%"><span>${x.value?formatMoney(x.value).replace(',00',''):''}</span></div><label>${x.label}</label></div>`).join('')}</div></div></div></article>
      <article class="card"><div class="panel-head"><div><h3>Status das devoluções</h3><p>Distribuição no período</p></div></div><div class="donut" style="background:conic-gradient(${gradient})"><div class="donut-center"><b>${list.length}</b><small>Total</small></div></div><div class="status-list">${statusCounts.map((x,i)=>`<div class="status-row"><i class="color" style="background:${colors[i]}"></i><span>${x.name}</span><b>${x.count}</b></div>`).join('')}</div></article></section>
      <section class="grid ranking-grid">${rankingHTML('Top motivos', 'trophy',aggregate(list,'reason'))}${rankingHTML('Top clientes','building',aggregate(list,'client'))}${rankingHTML('Top representantes','user',aggregate(list,'representative'))}</section>`
    }
    function wireDashboard(){document.querySelector('[data-go="new"]')?.addEventListener('click',()=>{state.editingId=null;setView('new')});document.querySelectorAll('[data-period]').forEach(b=>b.addEventListener('click',()=>{state.period=b.dataset.period;render()}))}

    function field(name,label,control,full=false){return `<div class="field ${full?'full':''}" data-field="${name}"><label>${label} <em>*</em></label>${control}<p class="field-error"></p></div>`}
    function inputControl(name,iconName,placeholder,type='text',extra=''){const v=name==='value'?moneyInput(formModel[name]):formModel[name];return `<div class="control">${icon(iconName)}<input id="${name}" name="${name}" type="${type}" value="${escapeHTML(v)}" placeholder="${escapeHTML(placeholder)}" ${extra}></div>`}
    function formHTML(){const editing=Boolean(state.editingId);return `${pageHead(editing?'Edição':'Novo registro',editing?'Editar devolução':'Cadastrar devolução',editing?'Atualize as informações e salve as alterações.':'Preencha os dados abaixo para registrar uma nova devolução.',`<button class="ghost" data-go="history">${icon('history')}Ver histórico</button>`)}
      <form id="returnForm" novalidate><section class="grid form-layout"><div class="card form-card"><div class="section-title"><span class="section-icon">${icon('file')}</span><div><h3>Informações da devolução</h3><p>Os campos marcados com asterisco são obrigatórios</p></div></div><div class="fields">
      ${field('cnpj','CNPJ',inputControl('cnpj','building','00.000.000/0000-00','text','inputmode="numeric" maxlength="18"'))}
      ${field('client','Nome do cliente',inputControl('client','building','Razão social ou nome fantasia'))}
      ${field('invoice','Nota fiscal',inputControl('invoice','file','Ex.: NF-12345'))}
      ${field('date','Data da devolução',inputControl('date','calendar','','date'))}
      ${field('carrier','Transportadora',inputControl('carrier','truck','Nome da transportadora'))}
      ${field('reason','Motivo da devolução',`<div class="control">${icon('return')}<select id="reason" name="reason"><option value="">Selecione um motivo</option>${REASONS.map(x=>`<option ${formModel.reason===x?'selected':''}>${x}</option>`).join('')}</select></div>`)}
      ${field('value','Valor da devolução',inputControl('value','money','0,00','text','inputmode="numeric"'))}
      ${field('representative','Representante',inputControl('representative','user','Nome do representante'))}
      ${field('status','Status',`<div class="control">${icon('clock')}<select id="status" name="status">${STATUSES.map(x=>`<option ${formModel.status===x?'selected':''}>${x}</option>`).join('')}</select></div>`)}
      <div></div><div class="field full" data-field="notes"><label>Observações <span style="color:#9aa7b8;font-weight:500">(opcional)</span></label><textarea id="notes" name="notes" placeholder="Inclua detalhes importantes sobre a devolução...">${escapeHTML(formModel.notes)}</textarea><p class="field-error"></p></div>
      </div><div class="form-actions"><button type="button" class="ghost" id="clearForm">${icon('eraser')}Limpar</button><button type="submit" class="primary">${icon('save')}${editing?'Salvar alterações':'Registrar devolução'}</button></div></div>
      <aside class="card summary-card"><div class="summary-top"><small>Resumo do registro</small><h3 id="sumClient">${escapeHTML(formModel.client||'Novo cliente')}</h3><p>Confira os principais dados antes de salvar.</p></div><div class="summary-body"><div class="summary-row"><span>Nota fiscal</span><b id="sumInvoice">${escapeHTML(formModel.invoice||'—')}</b></div><div class="summary-row"><span>Data</span><b id="sumDate">${formatDate(formModel.date)}</b></div><div class="summary-row"><span>Motivo</span><b id="sumReason">${escapeHTML(formModel.reason||'—')}</b></div><div class="summary-row"><span>Representante</span><b id="sumRep">${escapeHTML(formModel.representative||'—')}</b></div><div class="summary-value"><span>Valor da devolução</span><b id="sumValue">${formatMoney(formModel.value)}</b></div><div class="tip">${icon('info')}<span>Os dados são salvos automaticamente neste navegador. Exporte o histórico em CSV sempre que quiser uma cópia.</span></div></div></aside></section></form>`}
    function syncSummary(){document.getElementById('sumClient').textContent=formModel.client||'Novo cliente';document.getElementById('sumInvoice').textContent=formModel.invoice||'—';document.getElementById('sumDate').textContent=formatDate(formModel.date);document.getElementById('sumReason').textContent=formModel.reason||'—';document.getElementById('sumRep').textContent=formModel.representative||'—';document.getElementById('sumValue').textContent=formatMoney(formModel.value)}
    function wireForm(){
      document.querySelector('[data-go="history"]')?.addEventListener('click',()=>setView('history'));
      const form=document.getElementById('returnForm');
      form.querySelectorAll('input,select,textarea').forEach(el=>el.addEventListener('input',()=>{if(el.name==='cnpj'){el.value=maskCNPJ(el.value);formModel.cnpj=el.value}else if(el.name==='value'){formModel.value=parseMoney(el.value);el.value=moneyInput(formModel.value)}else formModel[el.name]=el.value;el.closest('.field')?.classList.remove('invalid');syncSummary()}));
      document.getElementById('clearForm').addEventListener('click',()=>{state.editingId=null;formModel=emptyForm();render();toast('Formulário limpo.','success')});
      form.addEventListener('submit',e=>{e.preventDefault();if(!validateForm())return;const record={...formModel,id:state.editingId||uid(),value:Number(formModel.value),_demo:false};if(state.editingId){records=records.map(r=>r.id===state.editingId?record:r);toast('Devolução atualizada com sucesso.','success')}else{if(records.length&&records.every(r=>r._demo))records=[];records.unshift(record);toast('Devolução registrada com sucesso.','success')}if(!persist())return;state.editingId=null;formModel=emptyForm();setView('history')})
    }
    function validateForm(){const errors={};if(!formModel.cnpj)errors.cnpj='Informe o CNPJ.';else if(!validCNPJ(formModel.cnpj))errors.cnpj='Digite um CNPJ válido.';if(!formModel.client.trim())errors.client='Informe o nome do cliente.';if(!formModel.invoice.trim())errors.invoice='Informe a nota fiscal.';if(!formModel.date)errors.date='Informe a data.';if(formModel.date>isoDate())errors.date='A data não pode estar no futuro.';if(!formModel.carrier.trim())errors.carrier='Informe a transportadora.';if(!formModel.reason)errors.reason='Selecione o motivo.';if(!formModel.value||formModel.value<=0)errors.value='Informe um valor maior que zero.';if(!formModel.representative.trim())errors.representative='Informe o representante.';if(!formModel.status)errors.status='Selecione o status.';document.querySelectorAll('.field').forEach(f=>{const msg=errors[f.dataset.field];f.classList.toggle('invalid',Boolean(msg));const p=f.querySelector('.field-error');if(p)p.textContent=msg||''});if(Object.keys(errors).length){document.querySelector('.field.invalid')?.scrollIntoView({behavior:'smooth',block:'center'});toast('Revise os campos destacados.','error');return false}return true}

    function filteredRecords(){const q=normalize(state.filters.query);return [...records].filter(r=>{const hay=normalize([r.client,r.cnpj,r.invoice,r.carrier,r.reason,r.representative,r.status].join(' '));return(!q||hay.includes(q))&&(!state.filters.status||r.status===state.filters.status)&&(!state.filters.start||r.date>=state.filters.start)&&(!state.filters.end||r.date<=state.filters.end)}).sort((a,b)=>b.date.localeCompare(a.date))}
    function historyHTML(){return `${pageHead('Consulta','Histórico de devoluções','Pesquise, filtre e gerencie todos os registros realizados.',`<button class="primary" data-go="new">${icon('plus')}Nova devolução</button>`)}
      <section class="card filter-card"><div class="filters"><div class="field search-field"><label>Pesquisar</label><div class="control">${icon('search')}<input id="historyQuery" value="${escapeHTML(state.filters.query)}" placeholder="Cliente, CNPJ, nota, motivo..."></div></div><div class="field"><label>Status</label><select id="filterStatus"><option value="">Todos os status</option>${STATUSES.map(s=>`<option ${state.filters.status===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="field"><label>Data inicial</label><input id="filterStart" type="date" value="${state.filters.start}"></div><div class="field"><label>Data final</label><input id="filterEnd" type="date" value="${state.filters.end}"></div><button class="ghost filter-action" id="clearFilters">${icon('eraser')}Limpar</button></div></section>
      <section class="card history-card"><div class="table-tools"><p><b id="resultCount">0</b> registro(s) encontrado(s)</p><button class="ghost" id="exportCsv">${icon('download')}Exportar CSV</button></div><div id="historyResults"></div></section>`}
    function resultsHTML(){const list=filteredRecords();document.getElementById('resultCount').textContent=list.length;if(!list.length)return `<div class="empty"><div class="empty-icon">${icon('search')}</div><h3>Nenhum registro encontrado</h3><p>Tente alterar os filtros ou cadastre uma nova devolução.</p><button class="primary" data-empty-new>${icon('plus')}Nova devolução</button></div>`;return `<div class="table-wrap"><table class="data-table"><thead><tr><th>Cliente / CNPJ</th><th>Nota fiscal</th><th>Data</th><th>Motivo</th><th>Valor</th><th>Representante</th><th>Status</th><th>Ações</th></tr></thead><tbody>${list.map(r=>`<tr><td class="client-cell"><b>${escapeHTML(r.client)}</b><span>${escapeHTML(r.cnpj)}</span></td><td class="nf-cell"><b>${escapeHTML(r.invoice)}</b><span>${escapeHTML(r.carrier)}</span></td><td>${formatDate(r.date)}</td><td>${escapeHTML(r.reason)}</td><td class="value-cell">${formatMoney(r.value)}</td><td>${escapeHTML(r.representative)}</td><td><span class="status ${statusClass(r.status)}">${escapeHTML(r.status)}</span></td><td><div class="actions"><button class="action-btn" data-action="view" data-id="${r.id}" title="Visualizar">${icon('eye')}</button><button class="action-btn" data-action="edit" data-id="${r.id}" title="Editar">${icon('edit')}</button><button class="action-btn del" data-action="delete" data-id="${r.id}" title="Excluir">${icon('trash')}</button></div></td></tr>`).join('')}</tbody></table></div>`}
    function updateResults(){document.getElementById('historyResults').innerHTML=resultsHTML();wireResultActions()}
    function wireHistory(){document.querySelector('[data-go="new"]')?.addEventListener('click',()=>{state.editingId=null;setView('new')});const q=document.getElementById('historyQuery');q.addEventListener('input',()=>{state.filters.query=q.value;document.getElementById('globalSearch').value=q.value;updateResults()});['Status','Start','End'].forEach(k=>document.getElementById(`filter${k}`).addEventListener('change',e=>{state.filters[k.toLowerCase()]=e.target.value;updateResults()}));document.getElementById('clearFilters').addEventListener('click',()=>{state.filters={query:'',status:'',start:'',end:''};document.getElementById('globalSearch').value='';render()});document.getElementById('exportCsv').addEventListener('click',exportCSV);updateResults()}
    function wireResultActions(){document.querySelector('[data-empty-new]')?.addEventListener('click',()=>{state.editingId=null;setView('new')});document.querySelectorAll('[data-action]').forEach(b=>b.addEventListener('click',()=>{const r=records.find(x=>x.id===b.dataset.id);if(!r)return;if(b.dataset.action==='view')showDetail(r);if(b.dataset.action==='edit'){state.editingId=r.id;formModel={...r};setView('new')}if(b.dataset.action==='delete')confirmDelete(r)}))}
    function showDetail(r){openModal(`<div class="modal"><div class="modal-head"><div><h3>${escapeHTML(r.client)}</h3><small style="color:#7c8ca1">${escapeHTML(r.invoice)} · ${formatDate(r.date)}</small></div><button class="icon-btn" data-close>${icon('x')}</button></div><div class="modal-body"><div class="detail-grid"><div class="detail"><span>CNPJ</span><b>${escapeHTML(r.cnpj)}</b></div><div class="detail"><span>Nota fiscal</span><b>${escapeHTML(r.invoice)}</b></div><div class="detail"><span>Data</span><b>${formatDate(r.date)}</b></div><div class="detail"><span>Transportadora</span><b>${escapeHTML(r.carrier)}</b></div><div class="detail"><span>Motivo</span><b>${escapeHTML(r.reason)}</b></div><div class="detail"><span>Valor</span><b style="color:var(--orange)">${formatMoney(r.value)}</b></div><div class="detail"><span>Representante</span><b>${escapeHTML(r.representative)}</b></div><div class="detail"><span>Status</span><b><span class="status ${statusClass(r.status)}">${escapeHTML(r.status)}</span></b></div><div class="detail full"><span>Observações</span><b>${escapeHTML(r.notes||'Nenhuma observação informada.')}</b></div></div></div><div class="modal-foot"><button class="ghost" data-close>Fechar</button><button class="secondary" data-modal-edit="${r.id}">${icon('edit')}Editar registro</button></div></div>`);document.querySelector('[data-modal-edit]').addEventListener('click',()=>{closeModal();state.editingId=r.id;formModel={...r};setView('new')})}
    function confirmDelete(r){openModal(`<div class="modal small"><div class="modal-head"><h3>Excluir devolução?</h3><button class="icon-btn" data-close>${icon('x')}</button></div><div class="modal-body"><p style="margin:0;color:#5e6f85;font-size:12px;line-height:1.65">O registro <b>${escapeHTML(r.invoice)}</b>, do cliente <b>${escapeHTML(r.client)}</b>, será removido deste navegador. Esta ação não poderá ser desfeita.</p></div><div class="modal-foot"><button class="ghost" data-close>Cancelar</button><button class="danger" id="deleteConfirm">${icon('trash')}Excluir</button></div></div>`);document.getElementById('deleteConfirm').addEventListener('click',()=>{records=records.filter(x=>x.id!==r.id);persist();closeModal();updateResults();document.getElementById('navCount').textContent=records.length;toast('Registro excluído.','success')})}
    function openModal(html){const layer=document.getElementById('modalLayer');layer.innerHTML=html;layer.classList.add('open');layer.setAttribute('aria-hidden','false');layer.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',closeModal))}
    function closeModal(){const layer=document.getElementById('modalLayer');layer.classList.remove('open');layer.setAttribute('aria-hidden','true');setTimeout(()=>layer.innerHTML='',180)}
    function exportCSV(){const list=filteredRecords();if(!list.length){toast('Não há registros para exportar.','error');return}const cols=['CNPJ','Cliente','Nota Fiscal','Data','Transportadora','Motivo','Valor','Representante','Status','Observações'];const quote=v=>`"${String(v??'').replace(/"/g,'""')}"`;const rows=list.map(r=>[r.cnpj,r.client,r.invoice,formatDate(r.date),r.carrier,r.reason,Number(r.value).toFixed(2).replace('.',','),r.representative,r.status,r.notes].map(quote).join(';'));const blob=new Blob(['\ufeff'+[cols.join(';'),...rows].join('\n')],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`devolucoes-${isoDate()}.csv`;a.click();URL.revokeObjectURL(url);toast('Arquivo CSV exportado.','success')}
    function toast(message,type='success'){const el=document.getElementById('toast');document.getElementById('toastText').textContent=message;el.className=`toast ${type} show`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3200)}
    function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('open')}

    document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{if(b.dataset.view==='new')state.editingId=null;setView(b.dataset.view)}));
    document.getElementById('menuBtn').addEventListener('click',()=>{document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('open')});
    document.getElementById('overlay').addEventListener('click',closeSidebar);
    document.getElementById('modalLayer').addEventListener('click',e=>{if(e.target.id==='modalLayer')closeModal()});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
    let searchTimer;document.getElementById('globalSearch').addEventListener('input',e=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>{state.filters.query=e.target.value;state.view='history';document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view==='history'));render()},160)});
    render();
  })();
  </script>
</body>
</html>
